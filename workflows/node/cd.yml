##
## CondoHome - Node.js CD Pipeline (Reusable)
## Publish to GitHub Packages, using GitHub Environments
##

name: Node.js CD

on:
  workflow_call:
    inputs:
      node-version:
        description: 'Node.js version'
        required: false
        type: string
        default: '22'
      package-manager:
        description: 'Package manager'
        required: false
        type: string
        default: 'pnpm'
      environment:
        description: 'GitHub Environment (development, staging, production)'
        required: true
        type: string

jobs:
  publish:
    name: Publish (${{ inputs.environment }})
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment }}
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        if: inputs.package-manager == 'pnpm'
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ inputs.node-version }}
          registry-url: 'https://npm.pkg.github.com'
          scope: '@rmaneschy'
          cache: ${{ inputs.package-manager }}

      - name: Install dependencies
        run: |
          if [ "${{ inputs.package-manager }}" = "pnpm" ]; then
            pnpm install --frozen-lockfile
          else
            npm ci
          fi

      - name: Build
        run: ${{ inputs.package-manager }} run build

      - name: Publish
        run: |
          if [ "${{ inputs.package-manager }}" = "pnpm" ]; then
            pnpm publish --no-git-checks --access public
          else
            npm publish --access public
          fi
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
