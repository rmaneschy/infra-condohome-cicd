##
## CondoHome - React/Vite CD Pipeline (Reusable)
## Build Docker image and push to GHCR, using GitHub Environments
##

name: React CD

on:
  workflow_call:
    inputs:
      image-name:
        description: 'Docker image name'
        required: true
        type: string
      node-version:
        description: 'Node.js version'
        required: false
        type: string
        default: '22'
      package-manager:
        description: 'Package manager'
        required: false
        type: string
        default: 'pnpm'
      environment:
        description: 'GitHub Environment (development, staging, production)'
        required: true
        type: string
      deploy-target:
        description: 'Deploy target (ghcr, pages)'
        required: false
        type: string
        default: 'ghcr'

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: rmaneschy

jobs:
  deploy-ghcr:
    name: Deploy to ${{ inputs.environment }}
    if: inputs.deploy-target == 'ghcr'
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment }}
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Determine image tags
        id: tags
        run: |
          ENV="${{ inputs.environment }}"
          SHORT_SHA="${{ github.sha }}"
          SHORT_SHA="${SHORT_SHA:0:7}"
          BASE="${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}/${{ inputs.image-name }}"
          if [ "$ENV" = "production" ]; then
            echo "tags=${BASE}:latest,${BASE}:production,${BASE}:${SHORT_SHA}" >> $GITHUB_OUTPUT
          else
            echo "tags=${BASE}:${ENV},${BASE}:${ENV}-${SHORT_SHA}" >> $GITHUB_OUTPUT
          fi

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.tags.outputs.tags }}
          build-args: |
            VITE_ENVIRONMENT=${{ inputs.environment }}
            VITE_API_URL=${{ vars.API_URL }}
          labels: |
            org.opencontainers.image.environment=${{ inputs.environment }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy-pages:
    name: Deploy to GitHub Pages
    if: inputs.deploy-target == 'pages'
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment }}
    permissions:
      contents: read
      pages: write
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        if: inputs.package-manager == 'pnpm'
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ inputs.node-version }}
          cache: ${{ inputs.package-manager }}

      - name: Install & Build
        run: |
          ${{ inputs.package-manager }} install --frozen-lockfile
          ${{ inputs.package-manager }} run build
        env:
          VITE_ENVIRONMENT: ${{ inputs.environment }}
          VITE_API_URL: ${{ vars.API_URL }}

      - name: Upload to Pages
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist/

      - name: Deploy to Pages
        uses: actions/deploy-pages@v4
