##
## CondoHome - React/Vite CI Pipeline
## Lint, Type-check, Build, Test
##

name: React CI

on:
  workflow_call:
    inputs:
      node-version:
        description: 'Node.js version'
        required: false
        type: string
        default: '22'
      package-manager:
        description: 'Package manager (pnpm, npm, yarn)'
        required: false
        type: string
        default: 'pnpm'
      build-command:
        description: 'Build command'
        required: false
        type: string
        default: 'build'
      skip-lint:
        description: 'Skip linting'
        required: false
        type: boolean
        default: false

jobs:
  build:
    name: Build & Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        if: inputs.package-manager == 'pnpm'
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node.js ${{ inputs.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ inputs.node-version }}
          cache: ${{ inputs.package-manager }}

      - name: Install dependencies
        run: |
          if [ "${{ inputs.package-manager }}" = "pnpm" ]; then
            pnpm install --frozen-lockfile
          elif [ "${{ inputs.package-manager }}" = "yarn" ]; then
            yarn install --frozen-lockfile
          else
            npm ci
          fi

      - name: Lint
        if: inputs.skip-lint == false
        run: |
          ${{ inputs.package-manager }} run lint || true

      - name: Type check
        run: |
          ${{ inputs.package-manager }} run typecheck || ${{ inputs.package-manager }} run type-check || true

      - name: Build
        run: ${{ inputs.package-manager }} run ${{ inputs.build-command }}

      - name: Test
        run: |
          ${{ inputs.package-manager }} run test --passWithNoTests || true

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/
          retention-days: 5
