##
## CondoHome - Spring Boot CI Pipeline
## Build, Test, Analyze (reusable workflow)
##
## Uso no repositório do microserviço:
##   jobs:
##     ci:
##       uses: rmaneschy/infra-condohome-cicd/.github/workflows/spring-boot-ci.yml@master
##       with:
##         java-version: '21'
##

name: Spring Boot CI

on:
  workflow_call:
    inputs:
      java-version:
        description: 'Java version to use'
        required: false
        type: string
        default: '21'
      maven-args:
        description: 'Additional Maven arguments'
        required: false
        type: string
        default: ''
      skip-tests:
        description: 'Skip tests'
        required: false
        type: boolean
        default: false

jobs:
  build:
    name: Build & Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK ${{ inputs.java-version }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ inputs.java-version }}
          distribution: 'temurin'
          cache: 'maven'

      - name: Cache Maven dependencies
        uses: actions/cache@v4
        with:
          path: ~/.m2/repository
          key: ${{ runner.os }}-maven-${{ hashFiles('**/pom.xml') }}
          restore-keys: |
            ${{ runner.os }}-maven-

      - name: Build with Maven
        run: |
          if [ "${{ inputs.skip-tests }}" = "true" ]; then
            ./mvnw clean package -DskipTests ${{ inputs.maven-args }}
          else
            ./mvnw clean verify ${{ inputs.maven-args }}
          fi

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-jar
          path: target/*.jar
          retention-days: 5

      - name: Upload test results
        if: always() && inputs.skip-tests == false
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: target/surefire-reports/
          retention-days: 5
