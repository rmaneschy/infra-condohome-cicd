##
## CondoHome - Python CI Pipeline
## Lint, Type-check, Test
##

name: Python CI

on:
  workflow_call:
    inputs:
      python-version:
        description: 'Python version'
        required: false
        type: string
        default: '3.12'
      dependency-manager:
        description: 'Dependency manager (pip, poetry, uv)'
        required: false
        type: string
        default: 'pip'
      skip-lint:
        description: 'Skip linting'
        required: false
        type: boolean
        default: false

jobs:
  build:
    name: Build & Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python ${{ inputs.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ inputs.python-version }}

      - name: Install uv
        if: inputs.dependency-manager == 'uv'
        run: pip install uv

      - name: Install Poetry
        if: inputs.dependency-manager == 'poetry'
        run: pip install poetry

      - name: Install dependencies
        run: |
          if [ "${{ inputs.dependency-manager }}" = "poetry" ]; then
            poetry install
          elif [ "${{ inputs.dependency-manager }}" = "uv" ]; then
            uv pip install -r requirements.txt --system
          else
            pip install -r requirements.txt
          fi

      - name: Install dev dependencies
        run: |
          pip install ruff mypy pytest pytest-cov || true

      - name: Lint with Ruff
        if: inputs.skip-lint == false
        run: |
          ruff check . || true

      - name: Type check with mypy
        run: |
          mypy . --ignore-missing-imports || true

      - name: Run tests
        run: |
          pytest --cov --cov-report=xml || true

      - name: Upload coverage
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage
          path: coverage.xml
          retention-days: 5
