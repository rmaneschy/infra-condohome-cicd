##
## CondoHome - Generic Docker Build & Push (Reusable)
## Using GitHub Environments
##

name: Docker Build & Push

on:
  workflow_call:
    inputs:
      image-name:
        description: 'Docker image name'
        required: true
        type: string
      dockerfile:
        description: 'Path to Dockerfile'
        required: false
        type: string
        default: './Dockerfile'
      context:
        description: 'Docker build context'
        required: false
        type: string
        default: '.'
      environment:
        description: 'GitHub Environment (development, staging, production)'
        required: true
        type: string
      platforms:
        description: 'Target platforms'
        required: false
        type: string
        default: 'linux/amd64'

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: rmaneschy

jobs:
  build-push:
    name: Build & Push (${{ inputs.environment }})
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment }}
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU
        if: contains(inputs.platforms, ',')
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Determine image tags
        id: tags
        run: |
          ENV="${{ inputs.environment }}"
          SHORT_SHA="${{ github.sha }}"
          SHORT_SHA="${SHORT_SHA:0:7}"
          BASE="${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}/${{ inputs.image-name }}"
          if [ "$ENV" = "production" ]; then
            echo "tags=${BASE}:latest,${BASE}:production,${BASE}:${SHORT_SHA}" >> $GITHUB_OUTPUT
          else
            echo "tags=${BASE}:${ENV},${BASE}:${ENV}-${SHORT_SHA}" >> $GITHUB_OUTPUT
          fi

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: ${{ inputs.context }}
          file: ${{ inputs.dockerfile }}
          platforms: ${{ inputs.platforms }}
          push: true
          tags: ${{ steps.tags.outputs.tags }}
          labels: |
            org.opencontainers.image.environment=${{ inputs.environment }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
